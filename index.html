                const resp = await fetch(`${baseUrl}/api/users`);
                if (!resp.ok) { showMessage('Failed to load users', false); return []; }
                return await resp.json();
            } catch (err) {
                console.error('fetchAllAccounts error', err);
                return [];
            }
        }

        async function showAdminPanel() {
            const current = localStorage.getItem('currentUsername');
            const accounts = await fetchAllAccounts();
            if (!accounts.find(u => u.username === current && u.isAdmin)) {
                document.getElementById('adminPanel').style.display = 'none';
                return;
            }
            adminAccountsCache = accounts.filter(u => u.username !== current);
            displayAccounts(adminAccountsCache);
            const searchInput = document.getElementById('searchUsername');
            if (searchInput) {
                searchInput.addEventListener('keypress', e => { if (e.key === 'Enter') searchUsers(); });
            }
            document.getElementById('adminPanel').style.display = 'block';
        }

            const filtered = adminAccountsCache.filter(acc => acc.username.toLowerCase().includes(term));
            displayAccounts(filtered);

<script>
// backend-driven message helpers (persisted in server messages.json)
window.sendMessage = async function(from, to, text) {
    if (!from || !to || !text) return false;
    try {
        const baseUrl = window.location.hostname === 'localhost' ? 'http://localhost:3000' : window.location.origin;
        const resp = await fetch(`${baseUrl}/api/messages`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ from, to, text })
        });
        return resp.ok;
    } catch (err) {
        console.error('sendMessage error', err);
        return false;
    }
};

window.getInbox = async function(username) {
    if (!username) return [];
    try {
        const baseUrl = window.location.hostname === 'localhost' ? 'http://localhost:3000' : window.location.origin;
        const resp = await fetch(`${baseUrl}/api/messages?username=${encodeURIComponent(username)}`);
        if (!resp.ok) return [];
        const msgs = await resp.json();
        return msgs.filter(m => m.to === username)
                   .sort((a,b)=> new Date(b.timestamp) - new Date(a.timestamp));
    } catch (err) {
        console.error('getInbox error', err);
        return [];
    }
};

window.getSent = async function(username) {
    if (!username) return [];
    try {
        const baseUrl = window.location.hostname === 'localhost' ? 'http://localhost:3000' : window.location.origin;
        const resp = await fetch(`${baseUrl}/api/messages?username=${encodeURIComponent(username)}`);
        if (!resp.ok) return [];
        const msgs = await resp.json();
        return msgs.filter(m => m.from === username)
                   .sort((a,b)=> new Date(b.timestamp) - new Date(a.timestamp));
    } catch (err) {
        console.error('getSent error', err);
        return [];
    }
};

window.markMessageRead = async function(messageId, username) {
    try {
        const baseUrl = window.location.hostname === 'localhost' ? 'http://localhost:3000' : window.location.origin;
        const resp = await fetch(`${baseUrl}/api/messages/${messageId}/read`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username })
        });
        return resp.ok;
    } catch (err) {
        console.error('markMessageRead error', err);
        return false;
    }
};

window.deleteMessage = async function(messageId, username) {
    try {
        const baseUrl = window.location.hostname === 'localhost' ? 'http://localhost:3000' : window.location.origin;
        const resp = await fetch(`${baseUrl}/api/messages/${messageId}`, {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username })
        });
        return resp.ok;
    } catch (err) {
        console.error('deleteMessage error', err);
        return false;
    }
};
</script>

            margin:0;
            font-size:1.6rem;
            letter-spacing:0.6px;
        }
        @keyframes logoPop{
            from{ transform: scale(.6); opacity:0 }
            to{ transform: scale(1); opacity:1 }
        }
        @keyframes entranceText{
            from{ transform: translateY(8px); opacity:0 }
            to{ transform: translateY(0); opacity:1 }
        }

        /* animate-in class for page elements */
        .animate-in .nav-center, .animate-in .admin-panel, .animate-in .game-container {
            transform: translateY(0);
            opacity: 1;
        }
        .nav-center, .admin-panel, .game-container {
            transform: translateY(10px);
            opacity: 0;
            transition: transform 520ms ease, opacity 520ms ease;
        }
    </style>

    <script>
        // Entrance overlay logic: hide after animation and enable page animations
        document.addEventListener('DOMContentLoaded', () => {
            const overlay = document.getElementById('entranceOverlay');
            // small delay so users see it briefly
            const showTime = 900; // ms (adjust)
            setTimeout(() => {
                if (!overlay) return;
                overlay.classList.add('hidden');
                // remove from DOM after transition to avoid blocking interactions
                overlay.addEventListener('transitionend', () => {
                    if (overlay && overlay.parentNode) overlay.parentNode.removeChild(overlay);
                }, { once: true });
                // add animate-in class to body so sections fade/slide in
                document.documentElement.classList.add('animate-in');
            }, showTime);
        });
    </script>
</body>
</html>
